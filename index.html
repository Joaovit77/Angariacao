<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Angariações — Controle de Locação</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA DE LOGIN / CADASTRO -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div class="brand" style="border:none; padding:0; margin-bottom:26px; justify-content:center;">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <span class="brand-title">Angariações</span>
        <span class="brand-sub">Controle de Locação</span>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Criar conta</button>
    </div>

    <form id="auth-form-login" class="auth-form">
      <div class="field-group"><label>E-mail</label><input type="email" id="auth-login-email" required placeholder="voce@imobiliaria.com"></div>
      <div class="field-group"><label>Senha</label><input type="password" id="auth-login-password" required placeholder="••••••••"></div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;">Entrar</button>
      <div class="auth-error" id="auth-login-error"></div>
    </form>

    <form id="auth-form-signup" class="auth-form" style="display:none;">
      <div class="field-group"><label>Nome</label><input type="text" id="auth-signup-name" required placeholder="Seu nome"></div>
      <div class="field-group"><label>E-mail</label><input type="email" id="auth-signup-email" required placeholder="voce@imobiliaria.com"></div>
      <div class="field-group"><label>Senha</label><input type="password" id="auth-signup-password" required placeholder="Mínimo 6 caracteres" minlength="6"></div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;">Criar conta</button>
      <div class="auth-error" id="auth-signup-error"></div>
      <div class="auth-hint">Cada conta é isolada — você só vê os imóveis que cadastrar com esse login.</div>
    </form>
  </div>
</div>

<!-- APP (só aparece após login confirmado) -->
<div class="app-shell" id="app-shell" style="display:none;">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <span class="brand-title">Angariações</span>
        <span class="brand-sub">Controle de Locação</span>
      </div>
    </div>

    <div class="nav-group">
      <button class="nav-item active" data-view="dashboard">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-view="pipeline">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3zM3 10h12v4H3zM3 17h7v4H3z"/></svg>
        Pipeline
        <span class="nav-item-badge" id="nav-badge-pipeline">0</span>
      </button>
      <button class="nav-item" data-view="metas">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
        Metas
      </button>
      <button class="nav-item" data-view="agenda">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
        Agenda
        <span class="nav-item-badge" id="nav-badge-agenda">0</span>
      </button>
      <button class="nav-item" data-view="insights">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a6 6 0 0 0-4 10.5c.7.66 1 1.3 1 2.5h6c0-1.2.3-1.84 1-2.5A6 6 0 0 0 12 2z"/></svg>
        Insights
      </button>
      <button class="nav-item" data-view="mapa">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4z"/><path d="M8 2v16M16 6v16"/></svg>
        Mapa
      </button>
      <button class="nav-item" data-view="relatorios">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6M9 9h1"/></svg>
        Relatórios
      </button>
      <button class="nav-item" data-view="roadmap">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
        Integrações &amp; IA
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user"></div>
      <button class="nav-item" style="padding:7px 8px; font-size:12.5px;" onclick="openConfigModal()">⚙ Configurações</button>
      <button class="nav-item" style="padding:7px 8px; font-size:12.5px;" onclick="handleLogout()">↩ Sair</button>
      Dados salvos na nuvem<br>(Supabase), por login.
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-content">
    <!-- Views injected by JS -->
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
